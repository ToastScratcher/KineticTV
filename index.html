<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToastTV📺🍞</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0a0a0b; --card: #161618; --accent: #3d5afe; --text: #ffffff; --side-width: 320px; }
        .light-mode { --bg: #f0f2f5; --card: #ffffff; --accent: #3d5afe; --text: #1c1e21; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; position: fixed; transition: 0.3s; }
        #top-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; }
        #clock { font-size: 1.4rem; font-weight: bold; color: var(--accent); }
        #home-screen { height: 100%; overflow-y: auto; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 0 30px; }
        .card { background: var(--card); padding: 25px 10px; text-align: center; border-radius: 15px; cursor: pointer; font-weight: bold; border: 3px solid transparent; transition: 0.2s; outline: none; }
        .card:focus, .card:hover { border-color: var(--accent); transform: scale(1.05); }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .settings-content { background: var(--card); width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; border: 1px solid var(--accent); color: var(--text); }
        .setting-row { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; }
        #player-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; }
        #side-list { position: fixed; left: 0; top: 0; bottom: 0; width: var(--side-width); background: #111; z-index: 2000; transform: translateX(-100%); transition: 0.3s; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #side-list.active { transform: translateX(0); }
        .list-item { padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; color: #fff; outline: none; }
        .list-item:focus, .list-item:hover { background: var(--accent); }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; pointer-events: none; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 50%, rgba(0,0,0,0.8) 100%); transition: 0.4s; }
        .overlay * { pointer-events: auto; }
        .btn { background: var(--accent); border: none; color: white; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; outline: none; }
    </style>
</head>
<body onload="updateLang()">

    <div id="home-screen">
        <div id="top-header">
            <div>
                <h1 id="app-title">ToastTV📺</h1>
                <button class="btn" onclick="toggleSettings()" style="padding:5px 15px; font-size:12px; margin-top:5px;">⚙️ SETTINGS</button>
            </div>
            <div id="clock">00:00:00</div>
        </div>
        <div class="grid" id="category-grid">
            <div class="card" tabindex="0" onclick="loadCat('Kurdish')">☀️ KURDISH</div>
            <div class="card" tabindex="0" onclick="loadCat('Movies')">🎬 MOVIES</div>
            <div class="card" tabindex="0" onclick="loadCat('Sports')">⚽ SPORTS</div>
            <div class="card" tabindex="0" onclick="loadCat('Kids')">🧸 KIDS</div>
            <div class="card" tabindex="0" onclick="loadCat('Greek')">🇬🇷 GREEK</div>
            <div class="card" tabindex="0" onclick="loadCat('English')">🇬🇧 ENGLISH</div>
            <div class="card" tabindex="0" onclick="loadCat('Spanish')">🇪🇸 SPANISH</div>
            <div class="card" tabindex="0" onclick="loadCat('French')">🇫🇷 FRENCH</div>
            <div class="card" tabindex="0" onclick="loadCat('Italian')">🇮🇹 ITALIAN</div>
            <div class="card" tabindex="0" onclick="loadCat('Arabic')">🇮🇶 ARABIC</div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h2 id="settings-label">Settings</h2>
            <div class="setting-row">
                <label id="theme-label">Theme</label>
                <select id="theme-select" onchange="updateTheme()">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                </select>
            </div>
            <div class="setting-row">
                <label id="lang-label">Language</label>
                <select id="lang-select" onchange="updateLang()">
                    <option value="en">English</option>
                    <option value="ku">Kurdish</option>
                    <option value="ar">Arabic</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                </select>
            </div>
            <div class="setting-row">
                <label id="alarm-label">Bedtime Alarm</label>
                <input type="time" id="bedtime-alarm">
            </div>
            <button class="btn" style="width:100%" onclick="toggleSettings()">SAVE</button>
        </div>
    </div>

    <div id="player-screen">
        <div id="side-list">
            <div style="padding:20px;"><input type="text" id="guide-search" placeholder="Filter..." oninput="filterGuide()" style="width:100%; padding:10px;"></div>
            <div id="list-content" style="overflow-y:auto; flex-grow:1;"></div>
            <button class="btn" onclick="toggleSidebar()" style="border-radius:0;">CLOSE</button>
        </div>
        <video id="video" playsinline onclick="toggleUI()"></video>
        <div class="overlay" id="player-ui">
            <div style="display:flex; justify-content:space-between;">
                <button class="btn" onclick="toggleSidebar()">☰ GUIDE</button>
                <button class="btn" style="background:#ff3b30" onclick="exit()">✕ EXIT</button>
            </div>
            <div style="display:flex; justify-content:center; gap:20px;">
                <button class="btn" onclick="changeCh(-1)">◄ PREV</button>
                <button class="btn" id="play-btn" onclick="togglePlay()">PAUSE</button>
                <button class="btn" onclick="changeCh(1)">NEXT ►</button>
            </div>
        </div>
    </div>

<script>
    const video = document.getElementById('video'), hls = new Hls();
    let playlist = [], currentList = [], curIdx = 0, uiTimer;

    const i18n = {
        en: { title: "ToastTV📺", settings: "Settings", theme: "Theme", lang: "Language", alarm: "Bedtime Alarm" },
        ku: { title: "تۆست تیڤی📺", settings: "ڕێکخستنەکان", theme: "ڕەنگ", lang: "زمان", alarm: "کاتی خەوتن" },
        ar: { title: "توست تي في📺", settings: "الإعدادات", theme: "المظهر", lang: "اللغة", alarm: "منبه النوم" },
        es: { title: "ToastTV📺", settings: "Ajustes", theme: "Tema", lang: "Idioma", alarm: "Alarma de cama" },
        fr: { title: "ToastTV📺", settings: "Paramètres", theme: "Thème", lang: "Langue", alarm: "Alarme de sommeil" }
    };

    function updateTheme() { document.body.className = document.getElementById('theme-select').value === 'light' ? 'light-mode' : ''; }
    function updateLang() {
        const l = document.getElementById('lang-select').value;
        const data = i18n[l] || i18n.en;
        document.getElementById('app-title').innerText = data.title;
        document.getElementById('settings-label').innerText = data.settings;
        document.getElementById('theme-label').innerText = data.theme;
        document.getElementById('lang-label').innerText = data.lang;
        document.getElementById('alarm-label').innerText = data.alarm;
    }
    function toggleSettings() { const m = document.getElementById('settings-modal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }

    setInterval(() => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        document.getElementById('clock').innerText = timeStr;
    }, 1000);

    async function init() {
        const sources = [
            { n: 'Kurdish', u: 'https://iptv-org.github.io/iptv/languages/kur.m3u' },
            { n: 'Movies', u: 'https://iptv-org.github.io/iptv/categories/movies.m3u' },
            { n: 'Sports', u: 'https://iptv-org.github.io/iptv/categories/sports.m3u' },
            { n: 'Kids', u: 'https://iptv-org.github.io/iptv/categories/kids.m3u' },
            { n: 'Greek', u: 'https://iptv-org.github.io/iptv/languages/ell.m3u' },
            { n: 'English', u: 'https://iptv-org.github.io/iptv/languages/eng.m3u' },
            { n: 'Spanish', u: 'https://iptv-org.github.io/iptv/languages/spa.m3u' },
            { n: 'French', u: 'https://iptv-org.github.io/iptv/languages/fra.m3u' },
            { n: 'Italian', u: 'https://iptv-org.github.io/iptv/languages/ita.m3u' },
            { n: 'Arabic', u: 'https://iptv-org.github.io/iptv/languages/ara.m3u' }
        ];
        for (let s of sources) {
            try {
                const r = await fetch(s.u), t = await r.text();
                t.split('\n').forEach((line, i, arr) => {
                    if (line.includes('#EXTINF')) {
                        const url = arr[i+1]?.trim();
                        if (url?.startsWith('http')) playlist.push({ name: line.split(',')[1]?.trim(), url, cat: s.n });
                    }
                });
            } catch (e) {}
        }
    }

    function loadCat(cat) {
        currentList = playlist.filter(i => i.cat === cat);
        renderSidebar(currentList);
        if (currentList.length > 0) play(0);
    }

    function play(idx) {
        curIdx = idx; const item = currentList[idx];
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        if (Hls.isSupported()) {
            hls.detachMedia(); hls.loadSource(item.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = item.url; video.play(); }
        toggleUI();
    }

    function togglePlay() { video.paused ? (video.play(), document.getElementById('play-btn').innerText="PAUSE") : (video.pause(), document.getElementById('play-btn').innerText="PLAY"); }
    function toggleUI() { document.getElementById('player-ui').style.opacity = '1'; clearTimeout(uiTimer); uiTimer = setTimeout(() => { document.getElementById('player-ui').style.opacity = '0' }, 5000); }
    function renderSidebar(list) { document.getElementById('list-content').innerHTML = list.map((ch, i) => `<div class="list-item" tabindex="0" onclick="play(${i})">${ch.name}</div>`).join(''); }
    function filterGuide() { renderSidebar(currentList.filter(ch => ch.name.toLowerCase().includes(document.getElementById('guide-search').value.toLowerCase()))); }
    function toggleSidebar() { document.getElementById('side-list').classList.toggle('active'); }
    function changeCh(dir) { curIdx = (curIdx + dir + currentList.length) % currentList.length; play(curIdx); }
    function exit() { video.pause(); document.getElementById('player-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'block'; }

    init();
</script>
</body>
</html>
