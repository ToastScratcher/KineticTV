<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToastTV📺🍞</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0a0a0b; --card: #161618; --accent: #3d5afe; --hover: #2a2a2d; --side-width: 320px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; position: fixed; }

        /* PREVENT WHITE SCREEN */
        #start-overlay { position: fixed; inset: 0; z-index: 20000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* HOVER & FOCUS STATES FOR TV USERS */
        .card, .list-item, .btn { transition: all 0.2s ease; outline: none; border: 2px solid transparent; }
        
        /* Category Card Hover */
        .card:hover, .card:focus { 
            background: var(--hover); 
            border-color: var(--accent); 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(61, 90, 254, 0.3);
        }
        
        /* Channel List Item Hover */
        .list-item:hover, .list-item:focus { 
            background: #1e1e21; 
            color: var(--accent);
            padding-left: 25px; /* Subtle slide effect */
        }
        .list-item.active-ch { 
            background: var(--accent) !important; 
            color: white !important; 
            font-weight: bold;
        }

        /* MOUNTAIN SCREENSAVER */
        #idle-screensaver { display: none; position: fixed; inset: 0; z-index: 10000; background-color: #000; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        #mountain-bg { position: absolute; inset: -100px; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; z-index: -1; animation: scroll-bg 25s linear infinite alternate; }
        @keyframes scroll-bg { from { transform: scale(1.1) translateX(-20px); } to { transform: scale(1.1) translateX(20px); } }

        .ss-card { width: 85%; max-width: 350px; padding: 30px; background: rgba(0,0,0,0.5); border-radius: 24px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .spotify-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 20px 0 8px 0; position: relative; }
        #progress-fill { width: 0%; height: 100%; background: #1db954; border-radius: 2px; transition: 0.1s; }
        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; font-family: monospace; }

        /* MAIN UI */
        #home-screen { display: none; padding: 20px; overflow-y: auto; height: 100%; background: var(--bg); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { background: var(--card); padding: 35px 5px; text-align: center; border-radius: 18px; cursor: pointer; font-weight: bold; font-size: 15px; }
        
        #player-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #side-list { position: fixed; left: 0; top: 0; bottom: 0; width: var(--side-width); max-width: 85vw; background: #0f0f11; z-index: 5000; transform: translateX(-100%); transition: 0.3s; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #side-list.active { transform: translateX(0); }
        .search-container { padding: 15px; background: #000; }
        #channel-search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1c; color: #fff; outline: none; }
        #list-content { overflow-y: auto; flex-grow: 1; }
        .list-item { padding: 15px; border-bottom: 1px solid #222; font-size: 14px; cursor: pointer; position: relative; }
        
        .ui-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; opacity: 1; transition: 0.5s; }
        .ui-overlay * { pointer-events: auto; }
        .btn { background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; padding: 15px; border-radius: 12px; }
        .btn:hover { background: #5c75ff; transform: scale(1.05); }
    </style>
</head>
<body onclick="resetIdle()">

    <audio id="ss-audio" loop preload="auto">
        <source src="Halcali - Otsukare Summer.mp3" type="audio/mpeg">
    </audio>

    <div id="start-overlay">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px; text-shadow: 0 0 15px rgba(61,90,254,0.6);">ToastTV📺</h1>
        <p id="load-status" style="color: #666; margin-bottom: 25px; letter-spacing: 1px;">READY FOR TRANSMISSION</p>
        <button class="btn" onclick="startApp()" style="padding: 22px 70px; font-size: 1.3rem;">START APP</button>
    </div>

    <div id="idle-screensaver" onclick="stopScreensaver()">
        <div id="mountain-bg"></div>
        <div class="ss-card">
            <h2 style="letter-spacing: 3px;">ToastTV</h2>
            <p style="color: #1db954; font-size: 12px; margin-top: 5px; font-weight: bold; text-transform: uppercase;">Halcali - Otsukare Summer</p>
            <div class="spotify-bar"><div id="progress-fill"></div></div>
            <div class="time-info">
                <span id="time-current">0:00</span>
                <span id="time-left">-0:00</span>
            </div>
        </div>
    </div>

    <div id="home-screen">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">ToastTV📺🍞</h1>
        <div class="grid">
            <div class="card" tabindex="0" onclick="filter('Sports')">⚽ SPORTS</div>
            <div class="card" tabindex="0" onclick="filter('News')">📰 NEWS</div>
            <div class="card" tabindex="0" onclick="filter('Movies')">🍿 MOVIES</div>
            <div class="card" tabindex="0" onclick="filter('Arabic')">🇮🇶 ARABIC</div>
            <div class="card" tabindex="0" onclick="filter('Kurdish')">🇹🇯 KURDISH</div>
            <div class="card" tabindex="0" onclick="filter('English')">🇬🇧 ENGLISH</div>
            <div class="card" tabindex="0" onclick="filter('French')">🇫🇷 FRENCH</div>
            <div class="card" tabindex="0" onclick="filter('Italian')">🇮🇹 ITALIAN</div>
        </div>
    </div>

    <div id="player-screen">
        <div id="side-list">
            <div class="search-container"><input type="text" id="channel-search" placeholder="Search..." oninput="handleSearch()"></div>
            <div id="list-content"></div>
            <button class="btn" onclick="toggleSidebar()" style="border-radius:0;">CLOSE</button>
        </div>
        <video id="video" playsinline onclick="showUI()"></video>
        <div class="ui-overlay" id="ui-overlay">
            <div style="display:flex; justify-content:space-between;">
                <button class="btn" onclick="toggleSidebar()">☰ CHANNELS</button>
                <button class="btn" style="background:#ff3b30" onclick="closePlayer()">✕ EXIT</button>
            </div>
            <div style="display:flex; gap:15px; align-self:center;">
                <button class="btn" onclick="prev()">◄</button>
                <button class="btn" id="play-btn" onclick="togglePlay()" style="min-width: 100px;">PAUSE</button>
                <button class="btn" onclick="next()">►</button>
            </div>
            <div id="channel-title-display" style="text-align:center; font-weight:bold; font-size: 1.2rem; text-shadow: 2px 2px 8px #000;"></div>
        </div>
    </div>

<script>
    const hls = new Hls(), video = document.getElementById('video'), audio = document.getElementById('ss-audio');
    let playlist = [], currentCategoryList = [], filteredList = [], curChUrl = "", idleTimer, uiTimer;

    function startApp() { 
        document.getElementById('start-overlay').style.display = 'none'; 
        document.getElementById('home-screen').style.display = 'block';
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e => console.log("Audio unlock"));
        init(); 
        resetIdle(); 
    }

    function resetIdle() {
        if (document.getElementById('idle-screensaver').style.display === 'flex') return;
        clearTimeout(idleTimer);
        if (getComputedStyle(document.getElementById('home-screen')).display !== 'none') {
            idleTimer = setTimeout(startScreensaver, 25000);
        }
    }

    function startScreensaver() {
        document.getElementById('idle-screensaver').style.display = 'flex';
        audio.play().catch(e => console.log("Audio error"));
        updateAudioUI();
    }

    function stopScreensaver() {
        document.getElementById('idle-screensaver').style.display = 'none';
        audio.pause();
        resetIdle();
    }

    function updateAudioUI() {
        if (!audio.paused && audio.duration) {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = pct + "%";
            document.getElementById('time-current').innerText = formatTime(Math.floor(audio.currentTime));
            document.getElementById('time-left').innerText = "-" + formatTime(Math.floor(audio.duration - audio.currentTime));
            requestAnimationFrame(updateAudioUI);
        }
    }

    function formatTime(secs) {
        let m = Math.floor(secs / 60), s = secs % 60;
        return m + ":" + (s < 10 ? "0" + s : s);
    }

    async function init() {
        const sources = [
            { c: 'Sports', u: 'https://iptv-org.github.io/iptv/categories/sports.m3u' },
            { c: 'News', u: 'https://iptv-org.github.io/iptv/categories/news.m3u' },
            { c: 'Movies', u: 'https://iptv-org.github.io/iptv/categories/movies.m3u' },
            { c: 'Arabic', u: 'https://iptv-org.github.io/iptv/languages/ara.m3u' },
            { c: 'Kurdish', u: 'https://iptv-org.github.io/iptv/languages/kur.m3u' },
            { c: 'English', u: 'https://iptv-org.github.io/iptv/languages/eng.m3u' },
            { c: 'French', u: 'https://iptv-org.github.io/iptv/languages/fra.m3u' },
            { c: 'Italian', u: 'https://iptv-org.github.io/iptv/languages/ita.m3u' }
        ];
        for (let s of sources) {
            fetch(s.u).then(res => res.text()).then(data => parse(data, s.c)).catch(e => {});
        }
    }

    function parse(data, cat) {
        let lines = data.split('\n');
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const name = lines[i].split(',')[1]?.trim() || "Channel";
                const url = lines[i+1]?.trim();
                if (url && url.startsWith('http') && !url.includes('192.168.')) {
                    playlist.push({ name, url, cat });
                }
            }
        }
    }

    function filter(cat) {
        currentCategoryList = playlist.filter(i => i.cat === cat);
        if (currentCategoryList.length === 0) { alert("Loading channels..."); return; }
        filteredList = [...currentCategoryList];
        document.getElementById('channel-search').value = "";
        renderList();
        playChannel(filteredList[0]);
    }

    function handleSearch() {
        const q = document.getElementById('channel-search').value.toLowerCase();
        filteredList = currentCategoryList.filter(item => item.name.toLowerCase().includes(q));
        renderList();
    }

    function renderList() {
        document.getElementById('list-content').innerHTML = filteredList.map((item, i) => `
            <div class="list-item ${item.url === curChUrl ? 'active-ch' : ''}" 
                 tabindex="0" 
                 onclick="playByIndex(${i})">📺 ${item.name}</div>
        `).join('');
    }

    function playByIndex(idx) { playChannel(filteredList[idx]); }

    function playChannel(ch) {
        curChUrl = ch.url;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('channel-title-display').innerText = ch.name;
        
        // Highlight active channel in sidebar
        renderList();

        if (Hls.isSupported() && ch.url.includes('.m3u8')) {
            hls.detachMedia(); hls.loadSource(ch.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else { video.src = ch.url; video.play().catch(() => {}); }
        showUI();
    }

    function toggleSidebar() { document.getElementById('side-list').classList.toggle('active'); }
    function closePlayer() { video.pause(); hls.stopLoad(); document.getElementById('player-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'block'; resetIdle(); }
    function togglePlay() { video.paused ? video.play() : video.pause(); }
    function next() { 
        let curIdx = filteredList.findIndex(i => i.url === curChUrl);
        playChannel(filteredList[(curIdx + 1) % filteredList.length]); 
    }
    function prev() { 
        let curIdx = filteredList.findIndex(i => i.url === curChUrl);
        playChannel(filteredList[(curIdx - 1 + filteredList.length) % filteredList.length]); 
    }
    function showUI() { const ui = document.getElementById('ui-overlay'); ui.style.opacity = '1'; clearTimeout(uiTimer); uiTimer = setTimeout(() => ui.style.opacity = '0', 4000); }
</script>
</body>
</html>
