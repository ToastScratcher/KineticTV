<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToastTV 📺</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #000; --accent: #3d5afe; --highlight: #00ff00; --arsenal: #ef0107; --quran: #2e7d32; }
        html { font-size: clamp(16px, 2.5vw, 24px); }
        * { box-sizing: border-box; margin: 0; padding: 0; color: #fff !important; }
        body { background: #000; font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

        #home-screen { height: 100%; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 100px; }
        .section-label { padding: 2rem 2rem 0.5rem; font-size: 1rem; color: #666 !important; text-transform: uppercase; font-weight: 800; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; padding: 1rem 2rem; }

        .card { 
            background: #161618; border-radius: 1rem; height: 130px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            font-size: 1.2rem; border: 3px solid transparent; transition: 0.2s; position: relative; z-index: 10;
        }
        .card:hover { border-color: #fff; transform: scale(1.03); background: #222; }
        .card:active { background: var(--accent) !important; }

        #player-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #yt-hidden { position: absolute; width: 1px; height: 1px; opacity: 0; }

        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 2rem; pointer-events: none; 
            opacity: 0; transition: 0.4s; z-index: 2000; background: rgba(0,0,0,0.6);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .btn { padding: 1.2rem 2.5rem; font-size: 1.1rem; font-weight: bold; border-radius: 0.8rem; background: #333; border: none; cursor: pointer; pointer-events: auto; }

        #side-guide { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 85%; max-width: 450px; 
            background: #0d0d0f; z-index: 3000; transform: translateX(-100%); transition: 0.3s;
            padding: 2rem; display: flex; flex-direction: column; border-right: 2px solid #222;
        }
        #side-guide.open { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="home-screen">
        <div style="padding: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="font-size: 3rem;">ToastTV</h1>
            <div id="clock" style="font-size: 1.5rem; font-weight: 800; color: var(--accent) !important;">00:00</div>
        </div>

        <div class="section-label">🇬🇧 UK & LOCAL</div>
        <div class="grid">
            <div class="card" onclick="loadCat('UK')">🇬🇧 UK TV</div>
            <div class="card" onclick="loadCat('Freeview')">📡 Freeview</div>
        </div>

        <div class="section-label">🎬 ENTERTAINMENT</div>
        <div class="grid">
            <div class="card" style="border-color: var(--quran)" onclick="loadCat('Quran')">🕌 Quran TV</div>
            <div class="card" onclick="loadCat('Sports')">⚽ Sports</div>
            <div class="card" onclick="loadCat('Movies')">🍿 Movies</div>
            <div class="card" onclick="loadCat('Music')">🎵 Music</div>
            <div class="card" onclick="loadCat('Kids')">🧸 Kids</div>
            <div class="card" onclick="loadCat('News')">🌍 News</div>
        </div>

        <div class="section-label">🌍 INTERNATIONAL</div>
        <div class="grid">
            <div class="card" onclick="loadCat('Arabic')">🇮🇶 Arabic</div>
            <div class="card" onclick="loadCat('Kurdish')">☀️ Kurdish</div>
            <div class="card" onclick="loadCat('Spanish')">🇪🇸 Spanish</div>
            <div class="card" onclick="loadCat('French')">🇫🇷 French</div>
            <div class="card" onclick="loadCat('German')">🇩🇪 German</div>
            <div class="card" onclick="loadCat('Italian')">🇮🇹 Italian</div>
            <div class="card" onclick="loadCat('Greek')">🇬🇷 Greek</div>
        </div>
    </div>

    <div id="player-screen">
        <video id="video" playsinline onclick="showUI()"></video>
        <div id="yt-hidden"></div>
        
        <div id="side-guide">
            <input type="text" placeholder="Search Arsenal..." oninput="checkArsenal(this.value)" 
                   style="width: 100%; padding: 1.2rem; background: #222; border: none; border-radius: 10px; margin-bottom: 1.5rem; font-size: 1.2rem;">
            <div id="list-items" style="overflow-y: auto; flex-grow: 1;"></div>
            <button class="btn" onclick="toggleGuide()" style="width: 100%; margin-top: 1rem;">BACK</button>
        </div>

        <div class="overlay" id="ui">
            <div style="display: flex; justify-content: space-between;">
                <button class="btn" onclick="toggleGuide()">🔍 GUIDE</button>
                <button class="btn" style="background: #ff3b30" onclick="exit()">✕ EXIT</button>
            </div>
            <div id="ch-name" style="text-align: center; font-size: 2rem; font-weight: 800;">ToastTV</div>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button class="btn" onclick="changeCh(-1)">PREV</button>
                <button class="btn" onclick="changeCh(1)">NEXT</button>
            </div>
        </div>
    </div>

<script>
    const hls = new Hls();
    let ytPlayer, channels = [], curIdx = 0, uiTimer;

    const sources = {
        'UK': 'https://iptv-org.github.io/iptv/countries/uk.m3u',
        'Freeview': 'https://iptv-org.github.io/iptv/countries/uk.m3u',
        'Arabic': 'https://iptv-org.github.io/iptv/languages/ara.m3u',
        'Kurdish': 'https://iptv-org.github.io/iptv/languages/kur.m3u',
        'Spanish': 'https://iptv-org.github.io/iptv/languages/spa.m3u',
        'French': 'https://iptv-org.github.io/iptv/languages/fra.m3u',
        'German': 'https://iptv-org.github.io/iptv/languages/deu.m3u',
        'Italian': 'https://iptv-org.github.io/iptv/languages/ita.m3u',
        'Greek': 'https://iptv-org.github.io/iptv/languages/ell.m3u',
        'Sports': 'https://iptv-org.github.io/iptv/categories/sports.m3u',
        'Movies': 'https://iptv-org.github.io/iptv/categories/movies.m3u',
        'Music': 'https://iptv-org.github.io/iptv/categories/music.m3u',
        'Kids': 'https://iptv-org.github.io/iptv/categories/kids.m3u',
        'News': 'https://iptv-org.github.io/iptv/categories/news.m3u',
        'Quran': 'https://iptv-org.github.io/iptv/categories/religious.m3u'
    };

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-hidden', { height:'0', width:'0', videoId:'qkwH6HYsW_8' });
    }

    async function loadCat(cat) {
        try {
            const r = await fetch(sources[cat]), t = await r.text();
            channels = [];
            t.split('\n').forEach((line, i, arr) => {
                if (line.includes('#EXTINF')) {
                    const name = line.split(',')[1]?.trim() || "Channel";
                    const url = arr[i+1]?.trim();
                    if (url?.startsWith('http')) {
                        if (cat === 'Quran' && !name.toLowerCase().match(/quran|islam|makkah/)) return;
                        channels.push({ name, url });
                    }
                }
            });
            if (channels.length > 0) play(0);
        } catch (e) { alert("Failed to load category."); }
    }

    function play(idx) {
        curIdx = idx;
        const item = channels[idx];
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('ch-name').innerText = item.name;

        if (Hls.isSupported()) {
            hls.loadSource(item.url); hls.attachMedia(document.getElementById('video'));
            hls.on(Hls.Events.MANIFEST_PARSED, () => document.getElementById('video').play());
        } else { document.getElementById('video').src = item.url; document.getElementById('video').play(); }
        showUI(); renderGuide();
    }

    function checkArsenal(val) {
        if (val.toLowerCase().trim() === 'arsenal') {
            document.getElementById('ui').style.background = "linear-gradient(to bottom, var(--arsenal), #000)";
            document.getElementById('ch-name').innerText = "ARSENAL: THE GREATEST CLUB IN THE WORLD";
            if (ytPlayer?.playVideo) ytPlayer.playVideo();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Arsenal the greatest club in the world"));
        }
    }

    function renderGuide() {
        document.getElementById('list-items').innerHTML = channels.slice(0, 100).map((ch, i) => 
            `<div style="padding:1.2rem; margin-bottom:0.5rem; background:#1a1a1c; border-radius:8px; cursor:pointer;" onclick="play(${i})">${ch.name}</div>`
        ).join('');
    }

    function showUI() {
        const ui = document.getElementById('ui'); ui.classList.add('active');
        clearTimeout(uiTimer); uiTimer = setTimeout(() => ui.classList.remove('active'), 5000);
    }

    function exit() {
        if (ytPlayer?.pauseVideo) ytPlayer.pauseVideo();
        document.getElementById('video').pause();
        document.getElementById('ui').style.background = "rgba(0,0,0,0.6)";
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }

    function toggleGuide() { document.getElementById('side-guide').classList.toggle('open'); }
    function changeCh(dir) { curIdx = (curIdx + dir + channels.length) % channels.length; play(curIdx); }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
</script>
</body>
</html>
