<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ToastTV📺🍞</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --bg: #0a0a0b; 
            --card: rgba(255, 255, 255, 0.06); 
            --accent: #3d5afe; 
            --text: #ffffff; 
            --safe-top: env(safe-area-inset-top);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* Force background color immediately to prevent white flash */
        body, html { 
            width: 100%; height: 100%; background-color: #0a0a0b !important; color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .toast-logo { font-size: 2.2rem; font-weight: 800; color: white; }

        #home-screen { height: 100vh; display: none; flex-direction: column; overflow-y: auto; padding-top: var(--safe-top); }

        #top-header { 
            padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(10, 10, 11, 0.95); backdrop-filter: blur(15px); z-index: 10;
        }

        #clock { color: var(--accent); font-size: 1.2rem; font-weight: 700; }
        .section-label { padding: 25px 20px 12px; font-size: 0.7rem; letter-spacing: 1.8px; opacity: 0.4; text-transform: uppercase; font-weight: 800; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; padding: 0 20px 40px; }

        .card { 
            background: var(--card); padding: 28px 12px; text-align: center; border-radius: 20px; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; font-size: 0.95rem; font-weight: 600;
        }
        .card:active { transform: scale(0.96); background: var(--accent); }

        #player-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; background: #000; }
        
        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 20px; pointer-events: none; opacity: 0; transition: opacity 0.4s;
            background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 50%, rgba(0,0,0,0.85) 100%); 
        }
        .overlay * { pointer-events: auto; }
        
        #side-list { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 85%; max-width: 320px; 
            background: #0f0f11; z-index: 2000; transform: translateX(-100%); transition: 0.3s ease; 
        }
        #side-list.active { transform: translateX(0); }

        .list-item { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1c; }

        .btn { background: var(--accent); border: none; color: white; padding: 12px 20px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="splash"><div class="toast-logo">ToastTV📺</div></div>

    <div id="home-screen">
        <div id="top-header">
            <h2 style="font-weight: 800; letter-spacing: -1px;">ToastTV</h2>
            <div id="clock">--:--</div>
        </div>

        <div class="section-label">⭐ Favorites</div>
        <div id="favorites-grid" class="grid"></div>

        <div class="section-label">📺 Categories</div>
        <div class="grid">
            <div class="card" onclick="loadCat('Freeview')">📡 Freeview</div>
            <div class="card" onclick="loadCat('Scottish')">🏴󠁧󠁢󠁳󠁣󠁴󠁿 Scottish</div>
            <div class="card" onclick="loadCat('Movies')">🎬 Movies</div>
            <div class="card" onclick="loadCat('Sports')">⚽ Sports</div>
            <div class="card" onclick="loadCat('Kids')">🧸 Kids</div>
            <div class="card" onclick="loadCat('Kurdish')">☀️ Kurdish</div>
            <div class="card" onclick="loadCat('English')">🇬🇧 English</div>
            <div class="card" onclick="loadCat('Arabic')">🇮🇶 Arabic</div>
        </div>
    </div>

    <div id="player-screen">
        <div id="side-list">
            <div style="padding:20px; border-bottom:1px solid #222">
                <input type="text" id="guide-search" placeholder="Search Guide..." oninput="doSearch()" 
                style="width:100%; padding:14px; border-radius:10px; background:#1c1c1e; border:none; color:white; font-size:16px; outline:none;">
            </div>
            <div id="list-content" style="overflow-y:auto; height:calc(100% - 150px);"></div>
            <button class="btn" onclick="toggleSidebar()" style="width:100%; border-radius:0; height:65px">CLOSE</button>
        </div>
        <video id="video" playsinline onclick="toggleUI()"></video>
        <div class="overlay" id="player-ui">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button class="btn" onclick="toggleSidebar()">☰ GUIDE</button>
                <button class="btn" style="background:#ff3b30" onclick="exit()">✕ EXIT</button>
            </div>
            <div id="ch-info" style="text-align:center; font-weight:700; background:rgba(0,0,0,0.5); padding:12px; border-radius:12px; max-width: 80%; margin: 0 auto;">Channel Name</div>
            <div style="display:flex; justify-content:space-around; align-items:center; padding-bottom: 20px;">
                <button class="btn" onclick="changeCh(-1)">PREV</button>
                <button class="btn" id="play-btn" onclick="togglePlay()" style="min-width:100px">PAUSE</button>
                <button class="btn" onclick="changeCh(1)">NEXT</button>
            </div>
        </div>
    </div>

<script>
    // PREVENT WHITE SCREEN: Start background immediately
    document.body.style.backgroundColor = "#0a0a0b";

    const video = document.getElementById('video'), hls = new Hls({
        xhrSetup: function(xhr, url) { xhr.withCredentials = false; } // Fixes some CORS issues
    });
    let playlist = [], currentList = [], filteredList = [], favorites = JSON.parse(localStorage.getItem('toastFavs') || '[]'), uiTimer, curIdx = 0;

    function bootApp() {
        // Ensure UI is ready
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('home-screen').style.display = 'flex';
                updateFavGrid();
            }, 800);
        }, 1500);
        init(); // Load channels
    }

    function doSearch() {
        const query = document.getElementById('guide-search').value.toLowerCase();
        filteredList = currentList.filter(ch => ch.name.toLowerCase().includes(query));
        renderSidebar(filteredList);
    }

    function toggleFav(e, name, url) {
        e.stopPropagation();
        const idx = favorites.findIndex(f => f.url === url);
        if(idx > -1) favorites.splice(idx, 1);
        else favorites.push({name, url});
        localStorage.setItem('toastFavs', JSON.stringify(favorites));
        renderSidebar(filteredList);
        updateFavGrid();
    }

    function updateFavGrid() {
        const grid = document.getElementById('favorites-grid');
        if(!grid) return;
        if(favorites.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; padding:20px; text-align:center; opacity:0.3; font-size:0.8rem">Heart a channel to save it</div>`;
            return;
        }
        grid.innerHTML = favorites.map(f => `<div class="card" onclick="playFav('${f.url}', '${f.name}')">⭐ ${f.name}</div>`).join('');
    }

    function playFav(url, name) { currentList = [{name, url}]; filteredList = [...currentList]; play(0); }

    async function init() {
        const sources = [
            { n: 'Freeview', u: 'https://iptv-org.github.io/iptv/countries/uk.m3u' },
            { n: 'Scottish', u: 'https://iptv-org.github.io/iptv/subdivisions/gb-sct.m3u' },
            { n: 'Kurdish', u: 'https://iptv-org.github.io/iptv/languages/kur.m3u' },
            { n: 'Movies', u: 'https://iptv-org.github.io/iptv/categories/movies.m3u' },
            { n: 'Sports', u: 'https://iptv-org.github.io/iptv/categories/sports.m3u' },
            { n: 'Kids', u: 'https://iptv-org.github.io/iptv/categories/kids.m3u' },
            { n: 'English', u: 'https://iptv-org.github.io/iptv/languages/eng.m3u' },
            { n: 'Arabic', u: 'https://iptv-org.github.io/iptv/languages/ara.m3u' }
        ];
        for (let s of sources) {
            try {
                const r = await fetch(s.u);
                if(!r.ok) continue;
                const t = await r.text();
                t.split('\n').forEach((line, i, arr) => {
                    if (line.includes('#EXTINF')) {
                        const url = arr[i+1]?.trim();
                        if (url?.startsWith('http')) playlist.push({ name: line.split(',')[1]?.trim() || "Unknown", url, cat: s.n });
                    }
                });
            } catch (e) { console.warn("Could not load " + s.n); }
        }
    }

    function loadCat(cat) {
        currentList = playlist.filter(i => i.cat === cat);
        filteredList = [...currentList];
        if(filteredList.length === 0) { alert("Loading channels, please wait..."); return; }
        document.getElementById('guide-search').value = "";
        renderSidebar(filteredList);
        play(0);
    }

    function play(idx) {
        curIdx = idx; const item = filteredList[idx];
        if(!item) return;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('ch-info').innerText = item.name;
        
        if (Hls.isSupported()) {
            hls.detachMedia(); hls.loadSource(item.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
            hls.on(Hls.Events.ERROR, (e, data) => { 
                if(data.fatal) document.getElementById('ch-info').innerHTML = `Stream Offline<br><button class="btn" style="margin-top:10px" onclick="changeCh(1)">Try Next</button>`; 
            });
        } else { video.src = item.url; video.play().catch(()=>{}); }
        toggleUI();
    }

    function renderSidebar(list) {
        const cont = document.getElementById('list-content');
        if(!cont) return;
        cont.innerHTML = list.map((ch, i) => {
            const isFav = favorites.some(f => f.url === ch.url);
            return `<div class="list-item" onclick="play(${i})">
                <span style="font-size:0.9rem">${ch.name}</span>
                <span style="font-size:1.3rem; ${isFav?'':'filter:grayscale(1)'}" onclick="toggleFav(event, '${ch.name}', '${ch.url}')">❤️</span>
            </div>`;
        }).join('');
    }

    function togglePlay() { video.paused ? video.play() : video.pause(); }
    function toggleUI() { 
        const ui = document.getElementById('player-ui');
        ui.style.opacity = '1'; clearTimeout(uiTimer); 
        uiTimer = setTimeout(() => ui.style.opacity = '0', 4000); 
    }
    function toggleSidebar() { document.getElementById('side-list').classList.toggle('active'); }
    function changeCh(dir) { curIdx = (curIdx + dir + filteredList.length) % filteredList.length; play(curIdx); }
    function exit() { video.pause(); hls.detachMedia(); document.getElementById('player-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'flex'; }

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);

    // Initial Trigger
    window.onload = bootApp;
</script>
</body>
</html>
