<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToastTV📺🍞</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0a0a0b; --card: #161618; --accent: #3d5afe; --hover: #2a2a2d; --side-width: 350px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; position: fixed; }

        #start-overlay { position: fixed; inset: 0; z-index: 20000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .card, .list-item, .btn { transition: all 0.2s ease; outline: none; border: 2px solid transparent; }
        .card { background: var(--card); padding: 35px 5px; text-align: center; border-radius: 18px; cursor: pointer; font-weight: bold; font-size: 15px; border: 1px solid #222; }
        .card:hover, .card:focus { background: var(--hover); border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(61, 90, 254, 0.3); }
        
        .list-item { padding: 18px; border-bottom: 1px solid #222; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .list-item:hover { background: #1e1e21; }
        .list-item.active-ch { border-left: 5px solid var(--accent); background: #1a1a1d; }
        .ch-name { font-weight: bold; font-size: 15px; color: #fff; }
        .epg-now { font-size: 12px; color: #1db954; font-weight: 500; }

        #idle-screensaver { display: none; position: fixed; inset: 0; z-index: 10000; background-color: #000; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        #mountain-bg { position: absolute; inset: -100px; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; z-index: -1; animation: scroll-bg 25s linear infinite alternate; }

        #home-screen { display: none; padding: 20px; overflow-y: auto; height: 100%; background: var(--bg); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 25px; }
        #player-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #side-list { position: fixed; left: 0; top: 0; bottom: 0; width: var(--side-width); max-width: 85vw; background: #0f0f11; z-index: 5000; transform: translateX(-100%); transition: 0.3s; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #side-list.active { transform: translateX(0); }
        .search-container { padding: 15px; background: #000; border-bottom: 1px solid #333; }
        #channel-search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1c; color: #fff; outline: none; }
        #list-content { overflow-y: auto; flex-grow: 1; }
        
        .ui-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; opacity: 1; transition: 0.5s; }
        .ui-overlay * { pointer-events: auto; }
        .btn { background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; padding: 15px; border-radius: 12px; }
    </style>
</head>
<body onclick="resetIdle()">

    <audio id="ss-audio" loop preload="auto">
        <source src="Halcali - Otsukare Summer.mp3" type="audio/mpeg">
    </audio>

    <div id="start-overlay">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px;">ToastTV📺</h1>
        <button class="btn" onclick="startApp()" style="padding: 22px 70px; font-size: 1.3rem;">START APP</button>
    </div>

    <div id="idle-screensaver" onclick="stopScreensaver()">
        <div id="mountain-bg"></div>
        <div class="ss-card">
            <h2>ToastTV</h2>
            <p style="color: #1db954; font-size: 12px; margin-top: 5px; font-weight: bold;">Halcali - Otsukare Summer</p>
        </div>
    </div>

    <div id="home-screen">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">ToastTV📺</h1>
        <div class="grid">
            <div class="card" onclick="filter('Freeview')">🇬🇧 FREEVIEW</div>
            <div class="card" onclick="filter('Spanish')">🇪🇸 SPANISH</div>
            <div class="card" onclick="filter('Sports')">⚽ SPORTS</div>
            <div class="card" onclick="filter('Movies')">🍿 MOVIES</div>
            <div class="card" onclick="filter('Arabic')">🇮🇶 ARABIC</div>
            <div class="card" onclick="filter('Kurdish')">🇹🇯 KURDISH</div>
            <div class="card" onclick="filter('English')">🇬🇧 ENGLISH</div>
            <div class="card" onclick="filter('French')">🇫🇷 FRENCH</div>
            <div class="card" onclick="filter('Italian')">🇮🇹 ITALIAN</div>
        </div>
    </div>

    <div id="player-screen">
        <div id="side-list">
            <div class="search-container"><input type="text" id="channel-search" placeholder="Search..." oninput="handleSearch()"></div>
            <div id="list-content"></div>
            <button class="btn" onclick="toggleSidebar()" style="border-radius:0;">CLOSE GUIDE</button>
        </div>
        <video id="video" playsinline onclick="showUI()"></video>
        <div class="ui-overlay" id="ui-overlay">
            <div style="display:flex; justify-content:space-between;">
                <button class="btn" onclick="toggleSidebar()">☰ TV GUIDE</button>
                <button class="btn" style="background:#ff3b30" onclick="closePlayer()">✕ EXIT</button>
            </div>
            <div style="display:flex; gap:15px; align-self:center;">
                <button class="btn" onclick="prev()">◄</button>
                <button class="btn" id="play-btn" onclick="togglePlay()">PAUSE</button>
                <button class="btn" onclick="next()">►</button>
            </div>
            <div id="channel-title-display" style="text-align:center; font-weight:bold;"></div>
        </div>
    </div>

<script>
    const hls = new Hls(), video = document.getElementById('video'), audio = document.getElementById('ss-audio');
    let playlist = [], currentCategoryList = [], filteredList = [], curChUrl = "", idleTimer, uiTimer;

    function startApp() {
        document.getElementById('start-overlay').style.display = 'none'; 
        document.getElementById('home-screen').style.display = 'block';
        init(); 
        resetIdle(); 
    }

    async function init() {
        const sources = [
            { c: 'Freeview', u: 'https://iptv-org.github.io/iptv/countries/uk.m3u' },
            { c: 'Spanish', u: 'https://iptv-org.github.io/iptv/languages/spa.m3u' },
            { c: 'Sports', u: 'https://iptv-org.github.io/iptv/categories/sports.m3u' },
            { c: 'Movies', u: 'https://iptv-org.github.io/iptv/categories/movies.m3u' },
            { c: 'Arabic', u: 'https://iptv-org.github.io/iptv/languages/ara.m3u' },
            { c: 'Kurdish', u: 'https://iptv-org.github.io/iptv/languages/kur.m3u' },
            { c: 'English', u: 'https://iptv-org.github.io/iptv/languages/eng.m3u' },
            { c: 'French', u: 'https://iptv-org.github.io/iptv/languages/fra.m3u' },
            { c: 'Italian', u: 'https://iptv-org.github.io/iptv/languages/ita.m3u' }
        ];
        for (let s of sources) {
            fetch(s.u).then(res => res.text()).then(data => parse(data, s.c)).catch(e => {});
        }
    }

    function parse(data, cat) {
        let lines = data.split('\n');
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const name = lines[i].split(',')[1]?.trim() || "Unknown";
                const url = lines[i+1]?.trim();
                if (url && url.startsWith('http')) {
                    playlist.push({ name, url, cat });
                }
            }
        }
    }

    function filter(cat) {
        currentCategoryList = playlist.filter(i => i.cat === cat);
        filteredList = [...currentCategoryList];
        renderList();
        if (filteredList.length > 0) playChannel(filteredList[0]);
    }

    function renderList() {
        document.getElementById('list-content').innerHTML = filteredList.map((item, i) => `
            <div class="list-item ${item.url === curChUrl ? 'active-ch' : ''}" onclick="playByIndex(${i})">
                <span class="ch-name">📺 ${item.name}</span>
                <span class="epg-now">Live Stream</span>
            </div>`).join('');
    }

    function playByIndex(idx) { playChannel(filteredList[idx]); }

    function playChannel(ch) {
        curChUrl = ch.url;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('channel-title-display').innerHTML = ch.name;
        renderList();
        if (Hls.isSupported() && ch.url.includes('.m3u8')) {
            hls.detachMedia(); hls.loadSource(ch.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else { video.src = ch.url; video.play().catch(() => {}); }
        showUI();
    }

    function toggleSidebar() { document.getElementById('side-list').classList.toggle('active'); }
    function closePlayer() { video.pause(); hls.stopLoad(); document.getElementById('player-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'block'; resetIdle(); }
    function togglePlay() { video.paused ? (video.play(), document.getElementById('play-btn').innerText="PAUSE") : (video.pause(), document.getElementById('play-btn').innerText="PLAY"); }
    function next() { let curIdx = filteredList.findIndex(i => i.url === curChUrl); playChannel(filteredList[(curIdx + 1) % filteredList.length]); }
    function prev() { let curIdx = filteredList.findIndex(i => i.url === curChUrl); playChannel(filteredList[(curIdx - 1 + filteredList.length) % filteredList.length]); }
    function showUI() { const ui = document.getElementById('ui-overlay'); ui.style.opacity = '1'; clearTimeout(uiTimer); uiTimer = setTimeout(() => ui.style.opacity = '0', 4000); }
    function resetIdle() { clearTimeout(idleTimer); if (getComputedStyle(document.getElementById('home-screen')).display !== 'none') { idleTimer = setTimeout(() => { document.getElementById('idle-screensaver').style.display = 'flex'; audio.play(); }, 25000); } }
    function stopScreensaver() { document.getElementById('idle-screensaver').style.display = 'none'; audio.pause(); resetIdle(); }
    function handleSearch() { const q = document.getElementById('channel-search').value.toLowerCase(); filteredList = currentCategoryList.filter(item => item.name.toLowerCase().includes(q)); renderList(); }
</script>
</body>
</html>
