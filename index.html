<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToastTV IPTV Machine Pro - Zoom Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #222;
            --device-bg: #fff;
            --text: #000;
            --border: #000;
        }

        .dark-mode {
            --bg: #1a1a1a;
            --device-bg: #333;
            --text: #fff;
            --border: #555;
        }

        body { 
            background: var(--bg); display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Courier New', monospace;
            transition: background 0.3s; padding: 20px;
        }
        
        .device {
            width: 340px; height: auto; background: var(--device-bg); 
            border: 5px solid var(--border); border-radius: 40px; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; box-sizing: border-box; box-shadow: 10px 10px 0px #000; 
            color: var(--text); position: relative;
        }

        .top-bar { width: 100%; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 10px; }

        #screen-wrapper {
            width: 100%; height: 200px; background: #000;
            border: 4px solid var(--border); border-radius: 15px;
            position: relative; overflow: hidden; flex-shrink: 0;
        }

        /* ZOOM MODES */
        video { width: 100%; height: 100%; cursor: pointer; transition: transform 0.2s; }
        .fit { object-fit: contain; transform: scale(1); }
        .stretch { object-fit: fill; transform: scale(1); }
        .zoom { object-fit: cover; transform: scale(1.1); }

        #spinner-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: none; z-index: 20;
        }
        .fidget-spinner { width: 60px; height: 60px; animation: fidget-spin 0.4s linear infinite; position: relative; }
        .fidget-spinner div { position: absolute; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; }
        .fidget-spinner .center { background: #fff; top: 18px; left: 18px; z-index: 2; width: 20px; height: 20px; }
        .fidget-spinner .wing1 { background: #ff4757; top: 0; left: 18px; }
        .fidget-spinner .wing2 { background: #2ed573; bottom: 0; left: 0; }
        .fidget-spinner .wing3 { background: #1e90ff; bottom: 0; right: 0; }
        @keyframes fidget-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .info-box {
            width: 100%; min-height: 50px; border: 3px solid var(--border);
            margin-top: 15px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; text-align: center;
            background: #eee; padding: 10px; box-sizing: border-box; color: #000; border-radius: 10px;
        }

        .label { font-size: 10px; font-weight: bold; margin-top: 10px; align-self: flex-start; }
        select { width: 100%; padding: 8px; border: 3px solid var(--border); background: #fff; margin-top: 4px; border-radius: 8px; font-family: inherit; }

        .bottom-controls { display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 12px; border: 3px solid var(--border); 
            background: #3a8ded; color: white; font-weight: bold; cursor: pointer;
            text-align: center; border-radius: 12px; font-family: inherit; font-size: 12px;
        }
        .btn-pause { background: #ff4757; }
        .btn-zoom { background: #ffb142; color: #000; }
        .btn-import { background: #2ed573; color: #000; grid-column: span 2; }

        .credits { font-size: 10px; margin-top: 20px; text-align: center; }
        .credits a { color: #3a8ded; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body class="light-mode">

    <div class="device">
        <div class="top-bar">
            <span>TOAST-TV PRO</span>
            <div>
                <span style="cursor:pointer" onclick="toggleSettings()">🌓</span>
                <span id="clock" style="margin-left:10px">00:00</span>
            </div>
        </div>
        
        <div id="screen-wrapper">
            <div id="spinner-container">
                <div class="fidget-spinner">
                    <div class="center"></div><div class="wing1"></div><div class="wing2"></div><div class="wing3"></div>
                </div>
            </div>
            <video id="tv-screen" class="fit" playsinline onclick="togglePause()"></video>
        </div>

        <div class="info-box" id="channel-name">TOAST-TV READY</div>

        <div class="label">📂 CATEGORY:</div>
        <select id="playlist-selector" onchange="loadPlaylist()">
            <option value="">-- Select --</option>
            <option value="https://iptv-org.github.io/iptv/languages/eng.m3u">English</option>
            <option value="https://iptv-org.github.io/iptv/languages/fra.m3u">French</option>
            <option value="https://iptv-org.github.io/iptv/languages/ita.m3u">Italian</option>
            <option value="https://iptv-org.github.io/iptv/languages/kur.m3u">Kurdish</option>
        </select>

        <div class="label">📺 CHANNEL:</div>
        <select id="channel-selector" onchange="jumpToChannel()"></select>
        
        <div class="bottom-controls">
            <button class="btn btn-import" onclick="importURL()">📥 IMPORT CUSTOM M3U</button>
            <button id="play-pause-btn" class="btn btn-pause" onclick="togglePause()">PAUSE</button>
            <button class="btn" onclick="nextChannel()">NEXT ⏭️</button>
            <button class="btn btn-zoom" onclick="cycleZoom()" id="zoom-btn">ZOOM: FIT</button>
            <button class="btn" onclick="toggleFS()" style="background:#555">FULLSCREEN</button>
        </div>

        <div class="credits">
            Created by <a href="https://youtube.com/@2763jnj?si=r9F43p4EUyu9KQXJ" target="_blank">Toast420</a>
        </div>
    </div>

<script>
    const video = document.getElementById('tv-screen');
    const wrapper = document.getElementById('screen-wrapper');
    const nameDisplay = document.getElementById('channel-name');
    const spinner = document.getElementById('spinner-container');
    const channelDrop = document.getElementById('channel-selector');
    const zoomBtn = document.getElementById('zoom-btn');
    const hls = new Hls();
    let channels = [];
    let currentIndex = 0;
    let zoomMode = 0; // 0: fit, 1: stretch, 2: zoom

    function toggleSettings() {
        document.body.classList.toggle('dark-mode');
        document.body.classList.toggle('light-mode');
    }

    function toggleFS() {
        if (!document.fullscreenElement) {
            if (wrapper.requestFullscreen) wrapper.requestFullscreen();
            else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // --- ZOOM LOGIC ---
    function cycleZoom() {
        zoomMode = (zoomMode + 1) % 3;
        video.className = ""; // Clear classes
        
        if (zoomMode === 0) {
            video.classList.add('fit');
            zoomBtn.innerText = "ZOOM: FIT";
        } else if (zoomMode === 1) {
            video.classList.add('stretch');
            zoomBtn.innerText = "ZOOM: FILL";
        } else {
            video.classList.add('zoom');
            zoomBtn.innerText = "ZOOM: CROP";
        }
    }

    function togglePause() {
        if (video.paused) video.play(); else video.pause();
    }

    function importURL() {
        const url = prompt("Enter M3U Playlist URL:");
        if (url && url.startsWith('http')) fetchPlaylist(url);
    }

    async function loadPlaylist() {
        const url = document.getElementById('playlist-selector').value;
        if (url) fetchPlaylist(url);
    }

    async function fetchPlaylist(url) {
        spinner.style.display = 'block';
        try {
            const response = await fetch(url);
            const text = await response.text();
            const lines = text.split('\n');
            channels = [];
            channelDrop.innerHTML = "";
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    let name = lines[i].split(',')[1]?.trim() || "Channel";
                    let streamUrl = lines[i+1]?.trim();
                    if (streamUrl && streamUrl.startsWith('http')) {
                        channels.push({ name, url: streamUrl });
                        let opt = document.createElement('option');
                        opt.value = channels.length - 1;
                        opt.innerHTML = name;
                        channelDrop.appendChild(opt);
                    }
                }
            }
            if (channels.length > 0) playChannel(0);
        } catch (e) { alert("CORS Blocked."); }
        spinner.style.display = 'none';
    }

    function playChannel(index) {
        currentIndex = index;
        const channel = channels[index];
        nameDisplay.innerText = `CH ${index + 1}: ${channel.name}`;
        channelDrop.value = index;
        spinner.style.display = 'block';
        if (Hls.isSupported()) {
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); spinner.style.display = 'none'; });
        }
    }

    function nextChannel() { if (channels.length > 0) playChannel((currentIndex + 1) % channels.length); }
    function jumpToChannel() { playChannel(parseInt(channelDrop.value)); }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>
</body>
</html>
