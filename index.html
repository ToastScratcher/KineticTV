<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ToastTV📺</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0a0a0b; --card: rgba(255, 255, 255, 0.06); --accent: #3d5afe; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #0a0a0b !important; color: var(--text); font-family: sans-serif; overflow: hidden; }
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        #home-screen { height: 100vh; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 50px; }
        #top-header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(10, 10, 11, 0.95); backdrop-filter: blur(15px); z-index: 10; }
        .section-label { padding: 20px 20px 10px; font-size: 0.7rem; letter-spacing: 1.5px; opacity: 0.5; text-transform: uppercase; font-weight: 800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 0 20px; }
        .card { background: var(--card); padding: 25px 10px; text-align: center; border-radius: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); font-weight: 600; }
        .card:active { background: var(--accent); transform: scale(0.95); }
        #player-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; opacity: 0; transition: 0.4s; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent, rgba(0,0,0,0.8)); }
        .overlay * { pointer-events: auto; }
        #side-list { position: fixed; left: 0; top: 0; bottom: 0; width: 85%; max-width: 320px; background: #0f0f11; z-index: 2000; transform: translateX(-100%); transition: 0.3s; }
        #side-list.active { transform: translateX(0); }
        .list-item { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1c; }
        .btn { background: var(--accent); border: none; color: white; padding: 12px 18px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash"><h1 style="color:white">ToastTV📺</h1></div>

    <div id="home-screen">
        <div id="top-header"><h2>ToastTV</h2><div id="clock">00:00</div></div>
        
        <div class="section-label">⭐ Favorites</div>
        <div id="favorites-grid" class="grid"></div>

        <div class="section-label">🇬🇧 UK & Local</div>
        <div class="grid">
            <div class="card" onclick="loadCat('UK')">🇬🇧 UK</div>
            <div class="card" onclick="loadCat('English')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 English</div>
            <div class="card" onclick="loadCat('Freeview')">📡 Freeview</div>
        </div>

        <div class="section-label">🌍 International</div>
        <div class="grid">
            <div class="card" onclick="loadCat('Kurdish')">☀️ Kurdish</div>
            <div class="card" onclick="loadCat('Arabic')">🇮🇶 Arabic</div>
            <div class="card" onclick="loadCat('French')">🇫🇷 French</div>
            <div class="card" onclick="loadCat('Spanish')">🇪🇸 Spanish</div>
        </div>

        <div class="section-label">🎬 Entertainment</div>
        <div class="grid">
            <div class="card" onclick="loadCat('Movies')">🎥 Movies</div>
            <div class="card" onclick="loadCat('Sports')">⚽ Sports</div>
            <div class="card" onclick="loadCat('Kids')">🧸 Kids</div>
        </div>
    </div>

    <div id="player-screen">
        <div id="side-list">
            <div style="padding:20px; border-bottom:1px solid #222">
                <input type="text" id="guide-search" placeholder="Search Channels..." oninput="doSearch()" style="width:100%; padding:12px; border-radius:8px; background:#1c1c1e; border:none; color:white;">
            </div>
            <div id="list-content" style="overflow-y:auto; height:calc(100% - 140px);"></div>
            <button class="btn" onclick="toggleSidebar()" style="width:100%; border-radius:0; height:60px">CLOSE GUIDE</button>
        </div>
        <video id="video" playsinline onclick="toggleUI()"></video>
        <div class="overlay" id="player-ui">
            <div style="display:flex; justify-content:space-between;">
                <button class="btn" onclick="toggleSidebar()">☰ GUIDE</button>
                <button class="btn" style="background:#ff3b30" onclick="exit()">✕ EXIT</button>
            </div>
            <div id="ch-info" style="text-align:center; font-weight:bold; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; max-width:80%; margin:0 auto;">Channel Name</div>
            <div style="display:flex; justify-content:space-around; padding-bottom: 20px;">
                <button class="btn" onclick="changeCh(-1)">PREV</button>
                <button class="btn" onclick="changeCh(1)">NEXT</button>
            </div>
        </div>
    </div>

<script>
    const video = document.getElementById('video'), hls = new Hls();
    let playlist = [], currentList = [], filteredList = [], favorites = JSON.parse(localStorage.getItem('toastFavs') || '[]'), curIdx = 0, uiTimer;

    async function init() {
        const sources = [
            { n: 'UK', u: 'https://iptv-org.github.io/iptv/countries/uk.m3u' },
            { n: 'English', u: 'https://iptv-org.github.io/iptv/languages/eng.m3u' },
            { n: 'Freeview', u: 'https://iptv-org.github.io/iptv/countries/uk.m3u' }, // Shared source
            { n: 'Kurdish', u: 'https://iptv-org.github.io/iptv/languages/kur.m3u' },
            { n: 'French', u: 'https://iptv-org.github.io/iptv/languages/fra.m3u' },
            { n: 'Spanish', u: 'https://iptv-org.github.io/iptv/languages/spa.m3u' },
            { n: 'Movies', u: 'https://iptv-org.github.io/iptv/categories/movies.m3u' },
            { n: 'Sports', u: 'https://iptv-org.github.io/iptv/categories/sports.m3u' },
            { n: 'Kids', u: 'https://iptv-org.github.io/iptv/categories/kids.m3u' },
            { n: 'Arabic', u: 'https://iptv-org.github.io/iptv/languages/ara.m3u' }
        ];

        for (let s of sources) {
            try {
                const r = await fetch(s.u);
                const t = await r.text();
                t.split('\n').forEach((line, i, arr) => {
                    if (line.includes('#EXTINF')) {
                        const url = arr[i+1]?.trim();
                        if (url?.startsWith('http')) playlist.push({ name: line.split(',')[1]?.trim(), url, cat: s.n });
                    }
                });
            } catch (e) {}
        }
        document.getElementById('splash').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
        updateFavGrid();
    }

    function loadCat(cat) {
        currentList = playlist.filter(i => i.cat === cat);
        filteredList = [...currentList];
        renderSidebar(filteredList);
        if(currentList.length > 0) play(0);
        else alert("Loading " + cat + "...");
    }

    function play(idx) {
        curIdx = idx; const item = filteredList[idx];
        if(!item) return;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('ch-info').innerText = item.name;
        if (Hls.isSupported()) {
            hls.detachMedia(); hls.loadSource(item.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
            hls.on(Hls.Events.ERROR, (e, data) => { if(data.fatal) document.getElementById('ch-info').innerHTML = `Stream Offline<br><button class="btn" style="margin-top:10px" onclick="changeCh(1)">Try Next</button>`; });
        } else { video.src = item.url; video.play().catch(()=>{}); }
        toggleUI();
    }

    function toggleFav(e, name, url) {
        e.stopPropagation();
        const idx = favorites.findIndex(f => f.url === url);
        if(idx > -1) favorites.splice(idx, 1);
        else favorites.push({name, url});
        localStorage.setItem('toastFavs', JSON.stringify(favorites));
        renderSidebar(filteredList);
        updateFavGrid();
    }

    function updateFavGrid() {
        const grid = document.getElementById('favorites-grid');
        grid.innerHTML = favorites.length ? favorites.map(f => `<div class="card" onclick="playFav('${f.url}', '${f.name}')">⭐ ${f.name}</div>`).join('') : '<div style="grid-column:1/-1; opacity:0.3; font-size:0.8rem; padding:10px;">No favorites saved</div>';
    }

    function playFav(url, name) { filteredList = [{name, url}]; play(0); }

    function renderSidebar(list) {
        document.getElementById('list-content').innerHTML = list.map((ch, i) => {
            const isFav = favorites.some(f => f.url === ch.url);
            return `<div class="list-item" onclick="play(${i})"><span>${ch.name}</span><span onclick="toggleFav(event, '${ch.name}', '${ch.url}')">${isFav?'❤️':'🤍'}</span></div>`;
        }).join('');
    }

    function doSearch() {
        const query = document.getElementById('guide-search').value.toLowerCase();
        filteredList = currentList.filter(ch => ch.name.toLowerCase().includes(query));
        renderSidebar(filteredList);
    }

    function toggleUI() {
        const ui = document.getElementById('player-ui');
        ui.style.opacity = '1'; clearTimeout(uiTimer);
        uiTimer = setTimeout(() => ui.style.opacity = '0', 4000);
    }

    function toggleSidebar() { document.getElementById('side-list').classList.toggle('active'); }
    function changeCh(dir) { curIdx = (curIdx + dir + filteredList.length) % filteredList.length; play(curIdx); }
    function exit() { video.pause(); document.getElementById('player-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'flex'; }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    window.onload = init;
</script>
</body>
</html>
