<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ToastTV📺</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #000000; --accent: #3d5afe; --highlight: #00ff00; }
        
        /* Force TV browsers to show white text and black background */
        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; color: #ffffff !important; }
        
        body, html { 
            width: 100%; height: 100%; 
            background-color: #000000 !important; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
        }

        /* FORCED SPLASH SCREEN */
        #splash { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .toast-logo { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px var(--accent); }
        .loader { width: 50px; height: 50px; border: 5px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #home-screen { height: 100vh; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 50px; }
        #top-header { padding: 35px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1c; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        
        .section-label { padding: 30px 30px 10px; font-size: 0.9rem; letter-spacing: 2px; color: #888 !important; text-transform: uppercase; font-weight: 800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 0 30px 40px; }

        /* THE UNIVERSAL HIGHLIGHT (Fixes the hover issue) */
        .card, .btn, .list-item { 
            background: #161618; 
            border: 3px solid transparent; 
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            user-select: none;
            position: relative;
        }

        /* TRIGGERS: Works on TV Remote Focus, PC Mouse Hover, and Mobile Touch */
        .card:hover, .card:focus, .card:active,
        .btn:hover, .btn:focus, .btn:active,
        .list-item:hover, .list-item:focus, .list-item:active { 
            background: var(--accent) !important;
            border-color: #ffffff !important; 
            transform: scale(1.06); 
            box-shadow: 0 0 25px var(--highlight) !important;
            z-index: 10 !important;
        }

        .card { height: 100px; font-size: 1.2rem; font-weight: bold; width: 100%; }
        .list-item { width: 100%; padding: 20px; margin-bottom: 10px; font-size: 1.1rem; justify-content: flex-start; }

        #player-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; background: #000; }
        
        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 40px; pointer-events: none; opacity: 0; transition: 0.4s;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent, rgba(0,0,0,0.9));
        }
        .overlay * { pointer-events: auto; }
        
        #side-list { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 85%; max-width: 400px; 
            background: #0d0d0f; z-index: 2000; transform: translateX(-100%); transition: 0.3s; 
            border-right: 1px solid #222; padding: 20px;
        }
        #side-list.active { transform: translateX(0); }
        
        #guide-search {
            width:100%; padding:20px; border-radius:12px; background:#1a1a1c; border:2px solid #333; 
            font-size:18px; margin-bottom: 20px; transition: 0.2s;
        }
        #guide-search:focus { border-color: var(--accent); background: #222; }

        .btn { padding: 18px 30px; font-size: 1.1rem; font-weight: bold; }
        #ch-info { text-align:center; font-size: 1.8rem; font-weight:bold; background:rgba(0,0,0,0.8); padding:20px; border-radius:20px; border:1px solid #444; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="toast-logo">ToastTV📺</div>
        <div class="loader"></div>
        <p style="margin-top: 25px; color: #666 !important; letter-spacing: 1px;">INITIALIZING CHANNELS...</p>
    </div>

    <div id="home-screen">
        <div id="top-header">
            <h1 style="font-size: 2.5rem;">ToastTV</h1>
            <div id="clock" style="font-size: 1.5rem; font-weight: 800; color: var(--accent) !important;">--:--</div>
        </div>
        
        <div class="section-label">🇬🇧 UK & Local</div>
        <div class="grid">
            <button class="card" onclick="loadCat('UK')">🇬🇧 UK</button>
            <button class="card" onclick="loadCat('English')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 English</button>
            <button class="card" onclick="loadCat('Freeview')">📡 Freeview</button>
        </div>

        <div class="section-label">🌍 International</div>
        <div class="grid">
            <button class="card" onclick="loadCat('Kurdish')">☀️ Kurdish</button>
            <button class="card" onclick="loadCat('Arabic')">🇮🇶 Arabic</button>
            <button class="card" onclick="loadCat('French')">🇫🇷 French</button>
            <button class="card" onclick="loadCat('Spanish')">🇪🇸 Spanish</button>
        </div>

        <div class="section-label">🎬 Entertainment</div>
        <div class="grid">
            <button class="card" onclick="loadCat('Movies')">🎥 Movies</button>
            <button class="card" onclick="loadCat('Sports')">⚽ Sports</button>
            <button class="card" onclick="loadCat('Kids')">🧸 Kids</button>
        </div>
    </div>

    <div id="player-screen">
        <div id="side-list">
            <input type="text" id="guide-search" placeholder="Type to search..." oninput="doSearch()">
            <div id="list-content" style="overflow-y:auto; height:calc(100% - 160px);"></div>
            <button class="btn" onclick="toggleSidebar()" style="width:100%; background:#ff3b30">CLOSE GUIDE</button>
        </div>
        <video id="video" playsinline onclick="toggleUI()"></video>
        <div class="overlay" id="player-ui">
            <div style="display:flex; justify-content:space-between;">
                <button class="btn" onclick="toggleSidebar()">☰ GUIDE</button>
                <button class="btn" style="background:#ff3b30" onclick="exit()">✕ EXIT</button>
            </div>
            <div id="ch-info">Select a Channel</div>
            <div style="display:flex; justify-content:space-around; padding-bottom: 20px;">
                <button class="btn" onclick="changeCh(-1)">PREV</button>
                <button class="btn" onclick="changeCh(1)">NEXT</button>
            </div>
        </div>
    </div>

<script>
    const video = document.getElementById('video'), hls = new Hls();
    let playlist = [], currentList = [], filteredList = [], curIdx = 0, uiTimer;

    async function init() {
        const sources = [
            { n: 'UK', u: 'https://iptv-org.github.io/iptv/countries/uk.m3u' },
            { n: 'English', u: 'https://iptv-org.github.io/iptv/languages/eng.m3u' },
            { n: 'Freeview', u: 'https://iptv-org.github.io/iptv/countries/uk.m3u' },
            { n: 'Kurdish', u: 'https://iptv-org.github.io/iptv/languages/kur.m3u' },
            { n: 'French', u: 'https://iptv-org.github.io/iptv/languages/fra.m3u' },
            { n: 'Spanish', u: 'https://iptv-org.github.io/iptv/languages/spa.m3u' },
            { n: 'Movies', u: 'https://iptv-org.github.io/iptv/categories/movies.m3u' },
            { n: 'Sports', u: 'https://iptv-org.github.io/iptv/categories/sports.m3u' },
            { n: 'Kids', u: 'https://iptv-org.github.io/iptv/categories/kids.m3u' },
            { n: 'Arabic', u: 'https://iptv-org.github.io/iptv/languages/ara.m3u' }
        ];

        for (let s of sources) {
            try {
                const r = await fetch(s.u), t = await r.text();
                t.split('\n').forEach((line, i, arr) => {
                    if (line.includes('#EXTINF')) {
                        const url = arr[i+1]?.trim();
                        if (url?.startsWith('http')) playlist.push({ name: line.split(',')[1]?.trim() || "Live Channel", url, cat: s.n });
                    }
                });
            } catch (e) {}
        }
        
        document.getElementById('splash').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }

    function loadCat(cat) {
        currentList = playlist.filter(i => i.cat === cat);
        filteredList = [...currentList];
        renderSidebar(filteredList);
        if(currentList.length > 0) play(0);
    }

    function play(idx) {
        curIdx = idx; const item = filteredList[idx];
        if(!item) return;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('ch-info').innerText = item.name;
        if (Hls.isSupported()) {
            hls.detachMedia(); hls.loadSource(item.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
        } else { video.src = item.url; video.play().catch(()=>{}); }
        toggleUI();
    }

    function renderSidebar(list) {
        document.getElementById('list-content').innerHTML = list.map((ch, i) => {
            return `<button class="list-item" onclick="play(${i})"><span>${ch.name}</span></button>`;
        }).join('');
    }

    function toggleUI() {
        const ui = document.getElementById('player-ui');
        ui.style.opacity = '1'; clearTimeout(uiTimer);
        uiTimer = setTimeout(() => ui.style.opacity = '0', 5000);
    }

    function exit() { 
        video.pause(); 
        document.getElementById('player-screen').style.display = 'none'; 
        document.getElementById('home-screen').style.display = 'flex'; 
    }

    function toggleSidebar() { document.getElementById('side-list').classList.toggle('active'); }

    function changeCh(dir) { 
        curIdx = (curIdx + dir + filteredList.length) % filteredList.length; 
        play(curIdx); 
    }
    
    function doSearch() {
        const query = document.getElementById('guide-search').value.toLowerCase();
        filteredList = currentList.filter(ch => ch.name.toLowerCase().includes(query));
        renderSidebar(filteredList);
    }

    setInterval(() => {
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('clock').innerText = time;
    }, 1000);
    
    window.onload = init;
</script>
</body>
</html>
