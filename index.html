<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToastTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --google-bg: #0f1014;
            --card-bg: #ffffff;
            --text-dark: #000000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--google-bg); color: white; 
            font-family: 'Roboto', sans-serif; overflow: hidden;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(15,16,20,0.8), rgba(15,16,20,0.9)), 
                        url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=1920') center/cover;
            z-index: -1;
        }

        /* --- HOME SCREEN --- */
        #home-screen { 
            display: flex; flex-direction: column;
            width: 100%; height: 100%; padding: 5%; box-sizing: border-box;
            overflow-y: auto;
        }

        .top-nav { display: flex; align-items: center; gap: 20px; margin-bottom: 5vh; }
        .search-container { position: relative; flex-grow: 1; max-width: 400px; }

        #search-input {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 20px; border-radius: 25px; color: white; outline: none; font-size: 1rem;
        }

        #search-results {
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #1e1f24; border-radius: 10px; margin-top: 5px;
            max-height: 300px; overflow-y: auto; display: none; z-index: 2000;
        }

        .result-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .result-item:hover { background: rgba(255,255,255,0.2); }

        .hero-text { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: bold; margin: 0; color: #fff; }
        .sub-text { font-size: clamp(1rem, 2vw, 1.2rem); opacity: 0.8; margin-bottom: 4vh; }

        .flag-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1200px;
        }
        
        .flag-card {
            background: var(--card-bg); color: var(--text-dark);
            aspect-ratio: 4/5; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .flag-card:hover { transform: scale(1.08); }
        .flag-img { font-size: 3rem; margin-bottom: 10px; }
        .flag-label { font-size: 1.1rem; font-weight: bold; }

        .credits { margin-top: auto; padding-top: 20px; font-size: 14px; opacity: 0.7; }
        .credits a { color: #fff; text-decoration: underline; font-weight: bold; }

        /* --- PLAYER VIEW --- */
        #player-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; cursor: none;
        }
        #player-screen.show-ui { cursor: default; }

        video { width: 100%; height: 100%; object-fit: contain; }

        .player-controls {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out;
        }
        .show-ui .player-controls { opacity: 1; pointer-events: auto; }

        .ch-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 25px; text-align: center; }
        .btn-row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: center; }
        
        .ctrl-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-size: 0.9rem;
        }
        .btn-main { background: white; color: black; padding: 15px 35px; }

        /* LOADING SPINNER */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; z-index: 1100;
        }
        .spinner { width: 60px; height: 60px; animation: spin 0.4s linear infinite; position: relative; }
        .spinner div { position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; }
        .spinner .c { background: #fff; top: 20px; left: 20px; width: 20px; height: 20px; }
        .spinner .w1 { background: #ff4757; top: 0; left: 20px; }
        .spinner .w2 { background: #2ed573; bottom: 0; left: 0; }
        .spinner .w3 { background: #1e90ff; bottom: 0; right: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="home-screen">
        <div class="top-nav">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search channels..." oninput="doSearch(this.value)">
                <div id="search-results"></div>
            </div>
            <span class="nav-item active">Home</span>
            <span class="nav-item" style="cursor:pointer" onclick="importM3U()">Import</span>
        </div>

        <h1 class="hero-text">ToastTV</h1>
        <p class="sub-text">Select a flag or use search to find a channel</p>

        <div class="flag-grid">
            <div class="flag-card" onclick="filterByLang('English')">
                <div class="flag-img">🏴󠁧󠁢󠁥󠁮󠁧󠁿</div><div class="flag-label">english</div>
            </div>
            <div class="flag-card" onclick="filterByLang('French')">
                <div class="flag-img">🇫🇷</div><div class="flag-label">french</div>
            </div>
            <div class="flag-card" onclick="filterByLang('Italian')">
                <div class="flag-img">🇮🇹</div><div class="flag-label">italian</div>
            </div>
            <div class="flag-card" onclick="filterByLang('Kurdish')">
                <div class="flag-img">🇹🇯</div><div class="flag-label">kurdish</div>
            </div>
        </div>
        
        <div class="credits">
            Created by <a href="https://youtube.com/@2763jnj?si=r9F43p4EUyu9KQXJ" target="_blank">Toast420</a>
        </div>
    </div>

    <div id="player-screen" class="show-ui" onmousemove="resetTimer()" onclick="resetTimer()">
        <div id="loader"><div class="spinner"><div class="c"></div><div class="w1"></div><div class="w2"></div><div class="w3"></div></div></div>
        <video id="tv-video" playsinline onclick="playPause()"></video>
        <div class="player-controls">
            <div class="ch-title" id="ch-name">Channel Name</div>
            <div class="btn-row">
                <button class="ctrl-btn" onclick="exitPlayer()">BACK</button>
                <button class="ctrl-btn" onclick="shiftCH(-1)">PREVIOUS</button>
                <button class="ctrl-btn btn-main" onclick="playPause()" id="pp-btn">PAUSE</button>
                <button class="ctrl-btn" onclick="shiftCH(1)">NEXT</button>
                <button class="ctrl-btn" onclick="goFS()">FULLSCREEN</button>
                <div style="font-size: 0.8rem;">SPEED: 
                    <select style="background:none;color:white;border:1px solid white;border-radius:4px" onchange="changeSpeed(this.value)">
                        <option value="1" style="color:black">1x</option>
                        <option value="1.25" style="color:black">1.25x</option>
                        <option value="1.5" style="color:black">1.5x</option>
                        <option value="2" style="color:black">2x</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

<script>
    const video = document.getElementById('tv-video');
    const player = document.getElementById('player-screen');
    const home = document.getElementById('home-screen');
    const hls = new Hls();
    let allChannels = [];
    let curIdx = 0;
    let fadeTimer;

    const urls = {
        English: 'https://iptv-org.github.io/iptv/languages/eng.m3u',
        French: 'https://iptv-org.github.io/iptv/languages/fra.m3u',
        Italian: 'https://iptv-org.github.io/iptv/languages/ita.m3u',
        Kurdish: 'https://iptv-org.github.io/iptv/languages/kur.m3u'
    };

    async function init() {
        for (const lang in urls) {
            try {
                const r = await fetch(urls[lang]);
                const t = await r.text();
                const lines = t.split('\n');
                lines.forEach((l, i) => {
                    if (l.startsWith('#EXTINF')) {
                        let name = l.split(',')[1]?.trim() || "Stream";
                        let stream = lines[i+1]?.trim();
                        if (stream?.startsWith('http')) allChannels.push({name, stream, lang});
                    }
                });
            } catch(e) {}
        }
    }
    init();

    function resetTimer() {
        player.classList.add('show-ui');
        clearTimeout(fadeTimer);
        fadeTimer = setTimeout(() => { player.classList.remove('show-ui'); }, 5000);
    }

    function doSearch(val) {
        const results = document.getElementById('search-results');
        if (!val) { results.style.display = 'none'; return; }
        const matches = allChannels.filter(c => c.name.toLowerCase().includes(val.toLowerCase())).slice(0, 15);
        results.innerHTML = matches.map(m => `<div class="result-item" onclick="startPlay('${allChannels.indexOf(m)}')">${m.name} (${m.lang})</div>`).join('');
        results.style.display = matches.length ? 'block' : 'none';
    }

    function filterByLang(l) {
        const firstIdx = allChannels.findIndex(c => c.lang === l);
        if (firstIdx !== -1) startPlay(firstIdx);
    }

    function startPlay(idx) {
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('search-input').value = '';
        curIdx = parseInt(idx);
        home.style.display = 'none';
        player.style.display = 'block';
        resetTimer();
        loadStream(curIdx);
    }

    function loadStream(idx) {
        const ch = allChannels[idx];
        document.getElementById('ch-name').innerText = ch.name;
        document.getElementById('loader').style.display = 'block';
        if (Hls.isSupported()) {
            hls.loadSource(ch.stream); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); document.getElementById('loader').style.display = 'none'; });
        }
    }

    function playPause() {
        if (video.paused) { video.play(); document.getElementById('pp-btn').innerText = "PAUSE"; }
        else { video.pause(); document.getElementById('pp-btn').innerText = "PLAY"; }
        resetTimer();
    }

    function shiftCH(d) { curIdx = (curIdx + d + allChannels.length) % allChannels.length; loadStream(curIdx); resetTimer(); }
    function goFS() { if (video.requestFullscreen) video.requestFullscreen(); else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen(); }
    function changeSpeed(s) { video.playbackRate = parseFloat(s); }
    function exitPlayer() { video.pause(); player.style.display = 'none'; home.style.display = 'flex'; clearTimeout(fadeTimer); }
    function importM3U() { const u = prompt("M3U URL:"); if(u) fetch(u).then(r => r.text()).then(t => { /* load logic */ }); }
</script>
</body>
</html>
